<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S:MIRROR Ultimate | Your Life Mentor</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div id="app-container">
        <div id="mentor-bar">
            <div id="mentor-icon">🎙️</div>
            <div id="mentor-text">আসসালামু আলাইকুম! আপনার লক্ষ্য অর্জনে আমি পাশে আছি।</div>
        </div>

        <div id="setup-screen" class="screen">
            <h2 class="center">প্রোফাইল সেটআপ</h2>
            <div class="section-card">
                <input type="text" id="user-name" placeholder="আপনার নাম লিখুন">
                <select id="user-lang">
                    <option value="bn">বাংলা (Bengali)</option>
                    <option value="en">English</option>
                </select>
                <select id="user-gender">
                    <option value="male">ছাত্র (Male)</option>
                    <option value="female">ছাত্রী (Female)</option>
                </select>
                <button class="primary-btn" onclick="startApp()">যাত্রা শুরু করুন</button>
            </div>
        </div>

        <div id="main-dashboard" class="screen hidden">
            <div class="nav-tabs">
                <button id="btn-daily" class="active" onclick="switchTab('daily')">দৈনিক আয়না</button>
                <button id="btn-monthly" onclick="switchTab('monthly')">মাসিক পরিকল্পনা</button>
                <button id="btn-yearly" onclick="switchTab('yearly')">বাৎসরিক মিশন</button>
            </div>

            <section id="tab-daily" class="tab-content">
                <div class="section-card">
                    <label>তারিখ নির্বাচন:</label>
                    <input type="date" id="date-picker" onchange="loadDailyReport()">
                </div>

                <div class="section-card">
                    <h3>🕌 ইবাদত ও সালাত</h3>
                    <div id="salah-container">
                        </div>
                    <hr>
                    <div class="input-group">
                        <label>কুরআন তিলাওয়াত (আয়াত):</label>
                        <input type="number" id="d-quran" placeholder="আজ কত আয়াত পড়লেন?">
                    </div>
                    <div class="input-group">
                        <label>হাদিস পাঠ ও শিক্ষা (মিনিট):</label>
                        <input type="number" id="d-hadith" placeholder="আজকের হাদিস শিক্ষা">
                    </div>
                </div>

                <div class="section-card">
                    <h3>📚 জ্ঞানার্জন ও সময়</h3>
                    <input type="number" id="d-study" placeholder="একাডেমিক পড়াশোনা (ঘণ্টা)">
                    <input type="number" id="d-exercise" placeholder="ব্যায়াম/খেলাধুলা (মিনিট)">
                    <input type="number" id="d-social" placeholder="সোশ্যাল মিডিয়া/অপচয় (মিনিট)">
                    <label><input type="checkbox" id="d-news"> পত্রিকা/ম্যাগাজিন পাঠ</label>
                </div>

                <div class="section-card">
                    <h3>📞 যোগাযোগ ও সম্পর্ক</h3>
                    <input type="number" id="d-relatives" placeholder="আত্মীয়-স্বজন যোগাযোগ (জন)">
                    <input type="number" id="d-friends" placeholder="বন্ধু/শুভাকাঙ্ক্ষী (জন)">
                    <input type="number" id="d-new-people" placeholder="নতুন পরিচিত মানুষ (জন)">
                </div>

                <div class="section-card">
                    <h3>✅ দায়িত্ব ও কর্ম</h3>
                    <label><input type="checkbox" id="d-house-task"> পারিবারিক দায়িত্ব পালন</label>
                    <input type="number" id="d-good-work" placeholder="ভালো কাজের সময় (ঘণ্টা)">
                    <textarea id="d-critique" placeholder="আজকের আত্ম-সমালোচনা ও ভুলসমূহ..."></textarea>
                </div>

                <button class="primary-btn" onclick="saveDailyReport()">আজকের ডাটা সেভ করুন</button>
            </section>

            <section id="tab-monthly" class="tab-content hidden">
                <div class="section-card">
                    <h2 id="monthly-header">মাসিক পরিকল্পনা</h2>
                    <div class="input-group">
                        <label>মাসের নাম ও সাল:</label>
                        <input type="month" id="m-period">
                    </div>
                    
                    <h3>📖 কুরআন ও হাদিস টার্গেট</h3>
                    <input type="text" id="m-quran-surahs" placeholder="পঠিতব্য সূরার তালিকা">
                    <input type="number" id="m-quran-ayat-target" placeholder="গড় আয়াত লক্ষ্য (দৈনিক)">
                    <input type="text" id="m-hadith-goal" placeholder="হাদিস গ্রন্থ ও মুখস্ত বিষয়">
                    
                    <h3>💼 শিক্ষা ও যোগাযোগ বৃদ্ধি</h3>
                    <input type="text" id="m-books" placeholder="পঠিতব্য বইয়ের নাম">
                    <input type="number" id="m-new-friend-target" placeholder="নতুন বন্ধু বৃদ্ধির লক্ষ্য (জন)">
                    <input type="number" id="m-vip-comm" placeholder="ভিআইপি যোগাযোগ লক্ষ্য (জন)">
                    
                    <button class="primary-btn" onclick="saveMonthlyPlan()">মাসিক পরিকল্পনা লক করুন</button>
                </div>

                <div id="monthly-recap" class="section-card hidden">
                    <h3>📊 এক নজরে মাসিক রিপোর্ট</h3>
                    <div id="recap-stats"></div>
                    <div id="mentor-eval" class="mentor-box"></div>
                </div>
            </section>

            <section id="tab-yearly" class="tab-content hidden">
                <div class="section-card">
                    <h3>🏆 বাৎসরিক পরিকল্পনা</h3>
                    <textarea id="y-goals" rows="10" placeholder="বছরের শুরুতে আপনার বড় লক্ষ্যগুলো এখানে বিস্তারিত লিখুন (কুরআন, পড়াশোনা, ক্যারিয়ার, চরিত্র)..."></textarea>
                    <button class="primary-btn" onclick="saveYearlyPlan()">বাৎসরিক মিশন সেভ করুন</button>
                </div>
                <div id="yearly-review" class="section-card hidden">
                    <h3>🔍 বাৎসরিক পর্যালোচনা</h3>
                    <div id="yearly-summary"></div>
                </div>
            </section>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
